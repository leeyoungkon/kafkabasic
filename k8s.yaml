apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafkabasic
  namespace: kafka
  labels:
    app: kafkabasic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafkabasic
  template:
    metadata:
      labels:
        app: kafkabasic
    spec:
      containers:
        - name: kafkabasic
          image: yklee2002/kafkabasic:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: my-cluster-kafka-bootstrap.kafka:9092
---
apiVersion: v1
kind: Service
metadata:
  name: kafkabasic-service
  namespace: kafka
  labels:
    app: kafkabasic
spec:
  type: NodePort
  selector:
    app: kafkabasic
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
